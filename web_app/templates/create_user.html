{% extends "base.html" %}
{% block title %}Criar usuário | LEON WEB COLLAB{% endblock %}
{% block content %}
<section class="form-page">
  <div class="card form-card">
    <div class="eyebrow">NOVO ACESSO</div>
    <h1>Criar usuário</h1>
    <form method="post" class="form-stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Usuário<input name="username" minlength="3" required></label>
      <label>Senha inicial<input type="password" name="password" minlength="10" required></label>
      <label>
        Função
        <select name="role" required>
          {% for role in roles %}<option value="{{ role }}">{{ role }}</option>{% endfor %}
        </select>
      </label>
      <button class="button" type="submit">Criar acesso</button>
    </form>
  </div>
</section>
{% endblock %}
